# fly.toml app configuration file generated for cspf-backend-colin on 2025-09-17T13:49:17-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cspf-backend-colin'
primary_region = 'ord'

[build]

[env]
  GRAPH_CACHE_FILE = '/tmp/graph-cache.bin'
  GRAPH_RESOURCE_DIR = '/app/src/main/resources'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.checks]
    [http_service.checks.health]
      grace_period = "10s"
      interval = "30s"
      method = "GET"
      timeout = "5s"
      path = "/api/health"

[[vm]]
  size = 'shared-cpu-1x'
